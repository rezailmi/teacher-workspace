# Infrastructure for local pgw-web development.
# Provides MySQL (master + replica) and Redis.
#
# Usage:
#   docker compose up -d          # start containers
#   docker compose down            # stop containers
#   docker compose down -v         # stop and wipe all data

services:
  mysql-master:
    image: mysql:8.0
    platform: linux/x86_64
    container_name: pgw-mysql-master
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: pgdb
      MYSQL_USER: pg-local
      MYSQL_PASSWORD: LOCAL_DEV_REPLACED
      MYSQL_ROOT_PASSWORD: LOCAL_DEV_REPLACED
      TZ: Asia/Singapore
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql/master.cnf:/etc/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pLOCAL_DEV_REPLACED"]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql-replica:
    image: mysql:8.0
    platform: linux/x86_64
    container_name: pgw-mysql-replica
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: pgdb
      MYSQL_USER: pg-local
      MYSQL_PASSWORD: LOCAL_DEV_REPLACED
      MYSQL_ROOT_PASSWORD: LOCAL_DEV_REPLACED
      TZ: Asia/Singapore
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./docker/mysql/slave.cnf:/etc/my.cnf
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pLOCAL_DEV_REPLACED"]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql-init:
    image: mysql:8.0
    platform: linux/x86_64
    container_name: pgw-mysql-init
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    volumes:
      - ./docker/mysql/init-replica.sh:/init-replica.sh
    entrypoint: ["sh", "/init-replica.sh"]
    restart: "no"

  redis:
    image: redis:7.0.15-alpine
    container_name: pgw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgw-web:
    build:
      context: ..
      dockerfile: tw-pg-experiment/docker/pgw-web/Dockerfile
    container_name: pgw-web
    ports:
      - "3001:3001"
    env_file:
      - pgw-web.env.example
    environment:
      # Override DB hosts to use Docker network names instead of localhost
      DB_LOCAL_WRITER_CONNECTION_CONFIG: '{"username":"pg-local","password":"LOCAL_DEV_REPLACED","host":"mysql-master","connectionEndpoint":"mysql-master","port":"3306"}'
      DB_LOCAL_READER_CONNECTION_CONFIG: '{"username":"pg-local-read","password":"LOCAL_DEV_REPLACED","host":"mysql-replica","connectionEndpoint":"mysql-replica","port":"3306"}'
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_master_data:
  mysql_replica_data:
  redis_data:
